services:
  postgres:
    image: postgres:16-alpine
    container_name: adapt_postgres
    environment:
      POSTGRES_USER: adapt_user
      POSTGRES_PASSWORD: adapt_password
      POSTGRES_DB: adapt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adapt_user -d adapt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  adapt-app:
    profiles: ["single-image"]
    build:
      context: .
      dockerfile: Dockerfile.single
    container_name: adapt_app
    environment:
      NODE_ENV: production
      PORT: 3001
      ENGINE_PORT: 4001
      API_BASE_URL: http://localhost:3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: adapt_db
      DB_USER: adapt_user
      DB_PASSWORD: adapt_password
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRY: 7d
      ENGINE_SERVICE_URL: http://127.0.0.1:4001
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
      - "3001:3001"
      - "4001:4001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
