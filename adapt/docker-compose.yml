version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: adapt_postgres
    environment:
      POSTGRES_USER: adapt_user
      POSTGRES_PASSWORD: adapt_password
      POSTGRES_DB: adapt_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adapt_user -d adapt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
