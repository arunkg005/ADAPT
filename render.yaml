databases:
  - name: adapt-postgres-db
    databaseName: adapt_db
    user: adapt_user
    postgresMajorVersion: "16"

services:
  - type: web
    name: adapt-engine-service
    runtime: node
    rootDir: adapt/engine-service
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: adapt-backend-api
    runtime: node
    rootDir: adapt/backend
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: node dist/db/migrate.js
    startCommand: npm run start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: adapt-postgres-db
          property: connectionString
      - key: DB_SSL
        value: "false"
      - key: ENGINE_SERVICE_HOST
        fromService:
          type: web
          name: adapt-engine-service
          property: host
      - key: ENGINE_SERVICE_PORT
        fromService:
          type: web
          name: adapt-engine-service
          property: port
      - key: FRONTEND_URL
        value: https://frontend-wine-five-32.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://frontend-wine-five-32.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: REQUEST_BODY_LIMIT
        value: 1mb
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "600"
      - key: AUTH_RATE_LIMIT_MAX
        value: "40"
