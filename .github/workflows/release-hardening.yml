name: release-hardening

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'adapt/**'
      - 'Adapt_mobile_app/**'
      - '.github/workflows/release-hardening.yml'

jobs:
  workspace-final-check:
    name: Workspace Final Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: adapt_db
          POSTGRES_USER: adapt_user
          POSTGRES_PASSWORD: adapt_password
        options: >-
          --health-cmd="pg_isready -U adapt_user -d adapt_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            adapt/package-lock.json
            adapt/backend/package-lock.json
            adapt/engine-service/package-lock.json
            adapt/frontend/package-lock.json

      - name: Install workspace dependencies
        run: |
          cd adapt
          npm run install:all

      - name: Run final validation gate
        run: |
          cd adapt
          npm run check:final

  backend-security-audit:
    name: Backend Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: adapt/backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd adapt/backend
          npm ci

      - name: Audit production dependencies
        run: |
          cd adapt/backend
          npm audit --omit=dev

      - name: Build backend
        run: |
          cd adapt/backend
          npm run build

  mobile-release-artifacts:
    name: Mobile Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build unsigned release artifacts
        run: |
          cd Adapt_mobile_app
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: adapt-mobile-release-apk-unsigned
          path: Adapt_mobile_app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: adapt-mobile-release-aab
          path: Adapt_mobile_app/app/build/outputs/bundle/release/app-release.aab

  mobile-signed-readiness:
    name: Mobile Signed Release Readiness
    runs-on: ubuntu-latest
    if: ${{ secrets.ADAPT_RELEASE_STORE_FILE_BASE64 != '' && secrets.ADAPT_RELEASE_STORE_PASSWORD != '' && secrets.ADAPT_RELEASE_KEY_ALIAS != '' && secrets.ADAPT_RELEASE_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode release keystore
        run: |
          cd Adapt_mobile_app
          echo "${{ secrets.ADAPT_RELEASE_STORE_FILE_BASE64 }}" | base64 --decode > release-signing.jks

      - name: Run signed release readiness check
        run: |
          cd Adapt_mobile_app
          chmod +x gradlew
          ./gradlew checkReleaseReadiness \
            -PADAPT_RELEASE_STORE_FILE=${{ github.workspace }}/Adapt_mobile_app/release-signing.jks \
            -PADAPT_RELEASE_STORE_PASSWORD=${{ secrets.ADAPT_RELEASE_STORE_PASSWORD }} \
            -PADAPT_RELEASE_KEY_ALIAS=${{ secrets.ADAPT_RELEASE_KEY_ALIAS }} \
            -PADAPT_RELEASE_KEY_PASSWORD=${{ secrets.ADAPT_RELEASE_KEY_PASSWORD }}
